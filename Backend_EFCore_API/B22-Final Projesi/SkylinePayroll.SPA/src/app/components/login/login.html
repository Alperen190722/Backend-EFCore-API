<div class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8 space-y-6">
    
    <div class="text-center">
      <h2 class="text-3xl font-bold text-white tracking-tight">Skyline <span class="text-blue-500">Empire</span></h2>
      <p class="text-slate-400 mt-2 text-sm font-medium uppercase tracking-widest">Giriş Paneli</p>
    </div>

    <form class="space-y-4" #loginForm="ngForm"> <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Kullanici Adi</label>
        <input 
          type="text" 
          name="username" 
          [(ngModel)]="loginData.email" 
          class="w-full bg-slate-950 border border-slate-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-all" 
          placeholder="AlperenSkyline">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1">Şifre</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="loginData.password" 
          class="w-full bg-slate-950 border border-slate-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-all" 
          placeholder="••••••••">
      </div>

      <button 
        type="button"
        (click)="onLogin()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-500/20 transition-all transform active:scale-95">
        Giriş Yap
      </button>
    </form>

    <div class="forgot-password-link">
  <a routerLink="/forgot-password" class="text-muted">
    🔑 Şifremi unuttum
  </a>
</div>

    <div class="text-center">
      <span class="text-slate-500 text-xs">Access granted to authorized employees only.</span>
    </div>
  </div>
</div>
