<div class="forgot-container">
  <div class="card p-4 shadow-lg">
    <h3 class="text-center mb-3">Şifremi Unuttum</h3>
    <p class="text-muted small">E-posta adresini gir, sana bir sıfırlama bağlantısı gönderelim.</p>
    
    <div class="form-group mb-3">
      <label>E-posta Adresi</label>
      <input type="email" [(ngModel)]="email" class="form-control" placeholder="ornek@skyline.com">
    </div>

    <button (click)="onSendResetLink()" class="btn btn-primary w-100 mb-2">Bağlantı Gönder</button>
    <a routerLink="/login" class="btn btn-link w-100 text-decoration-none">Giriş Sayfasına Dön</a>
  </div>
</div>
