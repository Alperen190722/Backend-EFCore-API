<div class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6">
  <div *ngFor="let emp of employees"
    class="bg-[#111] border border-blue-900/30 p-6 rounded-xl hover:shadow-[0_0_20px_rgba(59,130,246,0.2)] transition-all relative overflow-hidden group">

    <div class="absolute top-4 right-4">
<span [ngClass]="{
    'bg-green-500/10 text-green-500 border-green-500/50 shadow-[0_0_15px_rgba(34,197,94,0.3)]': toNum(emp?.Status) === EmployeeStatus.Active,
    'bg-red-500/10 text-red-500 border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.3)]': toNum(emp?.Status) === EmployeeStatus.Passive,
    'bg-orange-500/10 text-orange-500 border-orange-500/50 shadow-[0_0_15px_rgba(249,115,22,0.4)] animate-pulse': toNum(emp?.Status) === EmployeeStatus.PendingResignation,
    'bg-yellow-500/10 text-yellow-500 border-yellow-500/50 shadow-[0_0_15px_rgba(234,179,8,0.3)]': toNum(emp?.Status) === EmployeeStatus.PendingTermination
}" class="text-[9px] uppercase tracking-[0.2em] font-black px-3 py-1 rounded-full border backdrop-blur-md transition-all">
  ● {{ isStatusValid(emp?.Status) ? getStatusLabel(emp?.Status) : 'YÜKLENİYOR...' }}
</span>
    </div>

    <div class="flex justify-between items-start mb-4">
      <div>
        <h3 class="text-blue-400 font-bold text-lg group-hover:text-blue-300 transition-colors">{{ emp.FullName }}</h3>
        <p class="text-gray-500 text-[10px] tracking-widest uppercase">{{ emp.RoleName }}</p>
      </div>
    </div>

    <div class="mt-4 border-t border-blue-900/10 pt-4">
      <div class="flex justify-between items-end">
        <div>
          <p class="text-gray-500 text-[9px] uppercase tracking-tighter mb-1">Department</p>
          <p class="text-white text-sm font-medium">{{ emp.DepartmentName }}</p>
        </div>
        <div class="text-right">
          <p class="text-gray-500 text-[9px] uppercase tracking-tighter mb-1">Net Salary</p>
          <p class="text-blue-400 font-mono font-bold text-lg leading-none">{{ emp.SalaryDisplay }}</p>
        </div>
      </div>
    </div>

    <div
      class="absolute inset-0 bg-gradient-to-br from-blue-600/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
    </div>
  </div>
</div>
