<nav class="flex items-center justify-between px-8 py-4 bg-[#0a0a0a] border-b border-blue-900/20 w-full backdrop-blur-md sticky top-0 z-50">
  

  <div class="flex flex-col cursor-pointer group" routerLink="/landing">
    <h1 class="text-xl font-bold text-blue-500 tracking-tighter group-hover:text-blue-400 transition-all drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]">
      SKYLINE <span class="text-white">PAYROLL</span>
    </h1>
    <p class="text-[8px] text-blue-300/30 tracking-[0.3em] uppercase font-black">Meritocracy System</p>
  </div>


  <div class="flex items-center gap-6">
    
<ng-container *ngIf="isLoggedIn">
      <div class="relative group/notif">
        <button class="relative p-2 text-blue-400 hover:text-blue-300 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span *ngIf="getUnreadCount(notifications$ | async) > 0" 
                class="absolute top-1 right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-600 text-[9px] font-black text-white animate-pulse">
            {{ getUnreadCount(notifications$ | async) }}
          </span>
        </button>

         
        <div class="absolute right-0 mt-2 w-80 origin-top-right scale-0 group-hover/notif:scale-100 transition-all duration-200 ease-out bg-[#0f0f0f] border border-blue-900/30 rounded-xl shadow-2xl overflow-hidden z-[60]">
          <div class="p-4 border-b border-blue-900/20 bg-blue-900/5 flex justify-between items-center">
            <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Bildirim Paneli</span>
            <span (click)="notifService.refreshNotifications()" class="text-[9px] text-blue-500/50 hover:text-blue-400 cursor-pointer transition-colors">Yenile</span>
          </div>

          <div class="max-h-96 overflow-y-auto custom-scrollbar">
            <div *ngIf="(notifications$ | async)?.length === 0" class="p-8 text-center text-[10px] text-gray-600 uppercase font-bold">
              Yeni mesaj bulunmuyor
            </div>


            <div *ngFor="let notif of (notifications$ | async)" 
                 class="p-4 border-b border-blue-900/10 hover:bg-blue-900/5 transition-colors relative group/item"
                 [ngClass]="{'bg-blue-500/5 border-l-2 border-l-blue-500': !notif.IsRead}">
              
              <div class="flex flex-col gap-1 pr-10">
                <span class="text-[11px] text-gray-300 leading-tight" [ngClass]="{'font-bold text-blue-100': !notif.IsRead}">
                  {{ notif.Message }}
                </span>
                
                <div class="flex items-center gap-3 mt-1">
                  <span class="text-[7px] text-gray-600 uppercase font-black">{{ notif.CreatedDate | date:'dd.MM.yyyy HH:mm' }}</span>
                  
                   
                  <button *ngIf="!notif.IsRead" 
                          (click)="markAsRead(notif.Id, $event)"
                          class="text-[8px] text-blue-500/60 hover:text-blue-400 font-black uppercase tracking-widest transition-all px-1 border border-blue-500/20 rounded">
                    Okundu
                  </button>
                </div>
              </div>

               
              <button (click)="clearNotif(notif.Id, $event)" 
                      class="absolute top-4 right-3 text-gray-700 hover:text-red-500 transition-colors p-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
    <button *ngIf="isLoggedIn" (click)="logout()" 
            class="px-5 py-2 text-[10px] font-black uppercase tracking-widest text-white border border-red-600/30 bg-red-600/10 rounded-lg hover:bg-red-600 transition-all duration-300 shadow-[0_0_15px_rgba(220,38,38,0.1)]">
      Oturum Kapat
    </button>

    <button *ngIf="!isLoggedIn" routerLink="/login" 
            class="px-5 py-2 text-[10px] font-black uppercase tracking-widest text-white bg-green-600 rounded-lg hover:bg-green-700 transition-all shadow-[0_0_15px_rgba(22,163,74,0.2)]">
      Oturum Aç
    </button>
  </div>
</nav>
