<main role="main" class="container" *ngIf="city; else loading"> <div class="row">
    <div class="col-md-6">
      <h2 class="mt-3 pt-3">Fotoğraflar</h2>
      <ngx-gallery *ngIf = "galleryImages" [options]="galleryOptions" [images]="galleryImages"></ngx-gallery>
      </div>
    <div class="col-md-6">
      <h2 class="mt-3 pt-3">Notlarim</h2>
      <div [innerHTML]="city.description"></div>
    </div>
  </div>
</main>
<ng-template #loading>
  <div class="container mt-5">Yükleniyor...</div>
</ng-template>
<app-photo></app-photo>
