<main role="main">
<div class="container">
  <div class="row">
<form [formGroup]="cityAddForm" (ngSubmit)="add()" class="">
<h2 class="mt-3 pt-3">Yeni bir şehir ekle</h2>
<div class ="form-group">
  <input type="text" id="name" formControlName="name" class="form-control" placeholder="Şehir adi" autofocus>
  <span class="help-block" *ngIf="cityAddForm.get('name')?.hasError('required') && cityAddForm.get('name')?.touched">
    Şehir adi zorunludur
  </span>
</div>
<div class ="form-group mt-3">
  <label for="description">Şehir Açiklamasi</label>
  <div class="NgxEditor__Wrapper">
    <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>
    <ngx-editor [editor]="editor"
      formControlName="description"
      placeholder="Şehir hakkinda detayli notlarinizi giriniz...">
</ngx-editor>
</div>
  <span class="help-block" *ngIf="cityAddForm.get('description')?.hasError('required') && cityAddForm.get('description')?.touched">
    Not girmeniz zorunludur
  </span>
  </div>
  <button type="submit" class="btn btn-lg btn-primary btn-block" [disabled]="!cityAddForm.valid">Ekle</button>
  <h6>{{cityAddForm.value|json}}</h6>
  <h6>{{cityAddForm.status|json}}</h6>
</form>
 </div>
</div>
</main>
